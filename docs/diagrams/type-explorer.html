<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>cmdb-kit Type Explorer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #f5f7fa;
    color: #333;
    line-height: 1.5;
  }

  header {
    background: #1a1a2e;
    color: #fff;
    padding: 20px 32px;
    display: flex;
    align-items: baseline;
    gap: 16px;
  }

  header h1 {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }

  header span {
    font-size: 13px;
    color: #8a8fa8;
    font-weight: 400;
  }

  .layout {
    display: flex;
    height: calc(100vh - 66px);
  }

  /* Tree panel */
  .tree-panel {
    width: 360px;
    min-width: 280px;
    background: #fff;
    border-right: 1px solid #e2e6ed;
    overflow-y: auto;
    padding: 16px 0;
  }

  .branch {
    margin-bottom: 4px;
  }

  .branch-header {
    display: flex;
    align-items: center;
    padding: 8px 16px;
    cursor: pointer;
    user-select: none;
    font-weight: 600;
    font-size: 14px;
    gap: 8px;
    transition: background 0.15s;
  }

  .branch-header:hover {
    background: #f0f2f5;
  }

  .branch-header .chevron {
    display: inline-flex;
    width: 18px;
    height: 18px;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: #666;
    transition: transform 0.2s;
    flex-shrink: 0;
  }

  .branch-header .chevron.collapsed {
    transform: rotate(-90deg);
  }

  .branch-header .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .branch-header .count {
    font-size: 11px;
    font-weight: 500;
    color: #888;
    margin-left: auto;
  }

  .branch-children {
    overflow: hidden;
    transition: max-height 0.3s ease;
  }

  .branch-children.collapsed {
    max-height: 0 !important;
  }

  .type-item {
    padding: 6px 16px 6px 52px;
    cursor: pointer;
    font-size: 13px;
    color: #444;
    transition: background 0.12s, color 0.12s;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .type-item:hover {
    background: #f0f4ff;
    color: #222;
  }

  .type-item.selected {
    background: #e8eeff;
    color: #1a1a2e;
    font-weight: 600;
  }

  .type-item .type-icon {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
    opacity: 0.6;
  }

  /* Detail panel */
  .detail-panel {
    flex: 1;
    overflow-y: auto;
    padding: 32px 40px;
  }

  .detail-empty {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: #999;
    font-size: 15px;
  }

  .detail-header {
    margin-bottom: 24px;
  }

  .detail-header h2 {
    font-size: 24px;
    font-weight: 700;
    color: #1a1a2e;
    margin-bottom: 4px;
  }

  .detail-header .branch-badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 10px;
    border-radius: 12px;
    color: #fff;
    margin-bottom: 8px;
  }

  .detail-header .description {
    font-size: 15px;
    color: #555;
  }

  .attr-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    margin-top: 16px;
  }

  .attr-table thead th {
    text-align: left;
    padding: 10px 14px;
    background: #f5f7fa;
    border-bottom: 2px solid #e2e6ed;
    font-weight: 600;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    color: #666;
  }

  .attr-table tbody td {
    padding: 10px 14px;
    border-bottom: 1px solid #eef0f4;
    vertical-align: top;
  }

  .attr-table tbody tr:hover {
    background: #fafbfd;
  }

  .attr-name {
    font-weight: 500;
    color: #1a1a2e;
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    font-size: 13px;
  }

  .attr-display {
    color: #666;
    font-size: 12px;
    margin-top: 2px;
  }

  .type-badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 4px;
    background: #e8eeff;
    color: #4A6FA5;
  }

  .type-badge.ref {
    background: #fff0e6;
    color: #c06020;
  }

  .type-badge.date {
    background: #e6f7f0;
    color: #2d8a5e;
  }

  .type-badge.integer {
    background: #f0e6ff;
    color: #7b4dbf;
  }

  .type-badge.boolean {
    background: #fde8e8;
    color: #c04040;
  }

  .ref-target {
    font-size: 12px;
    color: #4A6FA5;
    cursor: pointer;
    text-decoration: underline;
    text-decoration-style: dotted;
    text-underline-offset: 2px;
  }

  .ref-target:hover {
    color: #2a5090;
  }

  .multi-indicator {
    font-size: 10px;
    font-weight: 600;
    color: #999;
    margin-left: 4px;
  }

  .stats-bar {
    display: flex;
    gap: 24px;
    margin-top: 20px;
    padding: 12px 16px;
    background: #f9fafb;
    border-radius: 8px;
    border: 1px solid #eef0f4;
  }

  .stat {
    font-size: 12px;
    color: #888;
  }

  .stat strong {
    font-size: 18px;
    color: #333;
    display: block;
    font-weight: 700;
  }

  /* Responsive */
  @media (max-width: 768px) {
    .layout {
      flex-direction: column;
      height: auto;
    }
    .tree-panel {
      width: 100%;
      border-right: none;
      border-bottom: 1px solid #e2e6ed;
      max-height: 50vh;
    }
    .detail-panel {
      padding: 24px 20px;
    }
  }
</style>
</head>

  <h1>cmdb-kit Type Explorer</h1>
  <span>Extended schema - 59 types across 4 branches</span>

<div class="layout">
  <nav class="tree-panel" id="tree"></nav>
  <main class="detail-panel" id="detail">
    <div class="detail-empty">Select a type from the tree to view its attributes</div>

  // -- Build tree data --
  var branches = [];
  var structureMap = {};
  structure.forEach(function(item) {
    structureMap[item.name] = item;
    if (!item.parent) {
      branches.push({ name: item.name, description: item.description, children: [] });
    }
  });
  structure.forEach(function(item) {
    if (item.parent) {
      var branch = branches.find(function(b) { return b.name === item.parent; });
      if (branch) branch.children.push(item);
    }
  });

  // -- Utility: camelCase to Title Case --
  function camelToTitle(str) {
    return str
      .replace(/([A-Z])/g, ' $1')
      .replace(/^./, function(s) { return s.toUpperCase(); })
      .trim();
  }

  // -- Utility: resolve attribute type --
  function resolveType(attr) {
    if (attr.type === 1) return "Reference";
    if (attr.defaultTypeId === 4) return "Date";
    if (attr.defaultTypeId === 1) return "Integer";
    if (attr.defaultTypeId === 2) return "Boolean";
    return "Text";
  }

  function typeBadgeClass(typeStr) {
    if (typeStr === "Reference") return "ref";
    if (typeStr === "Date") return "date";
    if (typeStr === "Integer") return "integer";
    if (typeStr === "Boolean") return "boolean";
    return "";
  }

  // -- State --
  var selectedType = null;

  // -- Render tree --
  function renderTree() {
    var treeEl = document.getElementById("tree");
    var html = "";

    branches.forEach(function(branch) {
      var color = branchColors[branch.name] || "#888";
      var childCount = branch.children.length;

      html += '<div class="branch" data-branch="' + branch.name + '">';
      html += '<div class="branch-header" onclick="toggleBranch(this)">';
      html += '<span class="chevron">&#9660;</span>';
      html += '<span class="dot" style="background:' + color + '"></span>';
      html += '<span>' + branch.name + '</span>';
      html += '<span class="count">' + childCount + '</span>';
      html += '</div>';
      html += '<div class="branch-children" style="max-height:' + (childCount * 36) + 'px">';

      branch.children.forEach(function(child) {
        html += '<div class="type-item" data-type="' + child.name + '" onclick="selectType(\'' + child.name.replace(/'/g, "\\'") + '\')">';
        html += '<span class="type-icon" style="background:' + color + '"></span>';
        html += '<span>' + child.name + '</span>';
        html += '</div>';
      });

      html += '</div></div>';
    });

    treeEl.innerHTML = html;
  }

  // -- Toggle branch --
  window.toggleBranch = function(headerEl) {
    var chevron = headerEl.querySelector(".chevron");
    var children = headerEl.nextElementSibling;
    if (children.classList.contains("collapsed")) {
      children.classList.remove("collapsed");
      chevron.classList.remove("collapsed");
    } else {
      children.classList.add("collapsed");
      chevron.classList.add("collapsed");
    }
  };

  // -- Select type --
  window.selectType = function(typeName) {
    selectedType = typeName;

    // Update tree selection
    var items = document.querySelectorAll(".type-item");
    items.forEach(function(el) {
      el.classList.toggle("selected", el.getAttribute("data-type") === typeName);
    });

    renderDetail(typeName);
  };

  // -- Render detail --
  function renderDetail(typeName) {
    var detailEl = document.getElementById("detail");
    var typeInfo = structureMap[typeName];
    var attrs = attributes[typeName];

    if (!typeInfo) {
      detailEl.innerHTML = '<div class="detail-empty">Type not found</div>';
      return;
    }

    var branchName = typeInfo.parent || typeName;
    var color = branchColors[branchName] || "#888";

    var html = '<div class="detail-header">';
    html += '<span class="branch-badge" style="background:' + color + '">' + branchName + '</span>';
    html += '<h2>' + typeName + '</h2>';
    html += '<p class="description">' + (typeInfo.description || "") + '</p>';
    html += '</div>';

    if (attrs) {
      var attrKeys = Object.keys(attrs);
      var refCount = 0;
      var textCount = 0;
      attrKeys.forEach(function(key) {
        var t = resolveType(attrs[key]);
        if (t === "Reference") refCount++;
        else textCount++;
      });

      html += '<div class="stats-bar">';
      html += '<div class="stat"><strong>' + attrKeys.length + '</strong>attributes</div>';
      html += '<div class="stat"><strong>' + textCount + '</strong>value fields</div>';
      html += '<div class="stat"><strong>' + refCount + '</strong>references</div>';
      html += '</div>';

      html += '<table class="attr-table"><thead><tr>';
      html += '<th>Attribute</th><th>Type</th><th>Reference Target</th>';
      html += '</tr></thead><tbody>';

      attrKeys.forEach(function(key) {
        var attr = attrs[key];
        var typeStr = resolveType(attr);
        var badgeClass = typeBadgeClass(typeStr);
        var isMulti = attr.max === -1;

        html += '<tr>';
        html += '<td><div class="attr-name">' + key + '</div><div class="attr-display">' + camelToTitle(key) + '</div></td>';
        html += '<td><span class="type-badge ' + badgeClass + '">' + typeStr + '</span>';
        if (isMulti) html += '<span class="multi-indicator">(multi)</span>';
        html += '</td>';

        if (attr.referenceType) {
          html += '<td><span class="ref-target" onclick="selectType(\'' + attr.referenceType.replace(/'/g, "\\'") + '\')">' + attr.referenceType + '</span></td>';
        } else {
          html += '<td></td>';
        }

        html += '</tr>';
      });

      html += '</tbody></table>';
    } else {
      html += '<p style="color:#888;margin-top:16px;">No attributes defined for this type.</p>';
    }

    detailEl.innerHTML = html;
  }

  // -- Init --
  renderTree();

})();
</script>

</body>
</html>

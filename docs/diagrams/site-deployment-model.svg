<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600" font-family="sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#666"/>
    </marker>
    <marker id="crow-one" viewBox="0 0 12 12" refX="12" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <line x1="0" y1="0" x2="12" y2="6" stroke="#666" stroke-width="1.5"/>
      <line x1="0" y1="12" x2="12" y2="6" stroke="#666" stroke-width="1.5"/>
      <line x1="12" y1="0" x2="12" y2="12" stroke="#666" stroke-width="1.5"/>
    </marker>
    <marker id="one" viewBox="0 0 12 12" refX="0" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <line x1="0" y1="0" x2="0" y2="12" stroke="#666" stroke-width="1.5"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="600" fill="#fafafa" rx="4"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#333">Site Deployment Data Model</text>

  <!-- Legend -->
  <rect x="22" y="52" width="14" height="14" rx="3" fill="#7B68EE" opacity="0.85"/>
  <text x="42" y="63" font-size="11" fill="#555">Product Library</text>
  <rect x="152" y="52" width="14" height="14" rx="3" fill="#50C878" opacity="0.85"/>
  <text x="172" y="63" font-size="11" fill="#555">Directory</text>
  <rect x="252" y="52" width="14" height="14" rx="3" fill="#F0AD4E" opacity="0.85"/>
  <text x="272" y="63" font-size="11" fill="#555">Lookup Types</text>

  <!-- ==================== ENTITIES ==================== -->

  <!-- DEPLOYMENT SITE (center) -->
  <g transform="translate(330, 210)">
    <rect x="0" y="0" width="240" height="100" rx="8" fill="white" stroke="#7B68EE" stroke-width="2"/>
    <rect x="0" y="0" width="240" height="30" rx="8" fill="#7B68EE"/>
    <rect x="0" y="16" width="240" height="14" fill="#7B68EE"/>
    <text x="120" y="20" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Deployment Site</text>
    <text x="12" y="50" font-size="11" fill="#555">location, status, environment</text>
    <text x="12" y="66" font-size="11" fill="#555">goLiveDate, description</text>
    <text x="12" y="82" font-size="11" fill="#555">site (multi-product pattern)</text>
  </g>

  <!-- LOCATION (top-left) -->
  <g transform="translate(30, 110)">
    <rect x="0" y="0" width="180" height="64" rx="8" fill="white" stroke="#50C878" stroke-width="2"/>
    <rect x="0" y="0" width="180" height="28" rx="8" fill="#50C878"/>
    <rect x="0" y="14" width="180" height="14" fill="#50C878"/>
    <text x="90" y="19" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Location</text>
    <text x="12" y="48" font-size="11" fill="#555">city, address, coordinates</text>
  </g>

  <!-- ENVIRONMENT TYPE (top-right) -->
  <g transform="translate(690, 110)">
    <rect x="0" y="0" width="180" height="64" rx="8" fill="white" stroke="#F0AD4E" stroke-width="2"/>
    <rect x="0" y="0" width="180" height="28" rx="8" fill="#F0AD4E"/>
    <rect x="0" y="14" width="180" height="14" fill="#F0AD4E"/>
    <text x="90" y="19" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Environment Type</text>
    <text x="12" y="48" font-size="11" fill="#555">Prod, Staging, Dev, QA, DR</text>
  </g>

  <!-- SITE STATUS (bottom-right) -->
  <g transform="translate(690, 350)">
    <rect x="0" y="0" width="180" height="64" rx="8" fill="white" stroke="#F0AD4E" stroke-width="2"/>
    <rect x="0" y="0" width="180" height="28" rx="8" fill="#F0AD4E"/>
    <rect x="0" y="14" width="180" height="14" fill="#F0AD4E"/>
    <text x="90" y="19" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Site Status</text>
    <text x="12" y="48" font-size="11" fill="#555">Active, Provisioning, Maint.</text>
  </g>

  <!-- PRODUCT VERSION (top-center-right) -->
  <g transform="translate(530, 450)">
    <rect x="0" y="0" width="180" height="64" rx="8" fill="white" stroke="#7B68EE" stroke-width="2"/>
    <rect x="0" y="0" width="180" height="28" rx="8" fill="#7B68EE"/>
    <rect x="0" y="14" width="180" height="14" fill="#7B68EE"/>
    <text x="90" y="19" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Product Version</text>
    <text x="12" y="48" font-size="11" fill="#555">versionNumber, releaseDate</text>
  </g>

  <!-- DEPLOYMENT (center-bottom) -->
  <g transform="translate(300, 450)">
    <rect x="0" y="0" width="180" height="80" rx="8" fill="white" stroke="#7B68EE" stroke-width="2"/>
    <rect x="0" y="0" width="180" height="28" rx="8" fill="#7B68EE"/>
    <rect x="0" y="14" width="180" height="14" fill="#7B68EE"/>
    <text x="90" y="19" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Deployment</text>
    <text x="12" y="48" font-size="11" fill="#555">version, environment</text>
    <text x="12" y="64" font-size="11" fill="#555">deployDate, status</text>
  </g>

  <!-- DISTRIBUTION LOG (left-bottom) -->
  <g transform="translate(40, 450)">
    <rect x="0" y="0" width="180" height="80" rx="8" fill="white" stroke="#7B68EE" stroke-width="2"/>
    <rect x="0" y="0" width="180" height="28" rx="8" fill="#7B68EE"/>
    <rect x="0" y="14" width="180" height="14" fill="#7B68EE"/>
    <text x="90" y="19" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Distribution Log</text>
    <text x="12" y="48" font-size="11" fill="#555">version, site</text>
    <text x="12" y="64" font-size="11" fill="#555">distributionDate</text>
  </g>

  <!-- ORGANIZATION (left-center) -->
  <g transform="translate(30, 285)">
    <rect x="0" y="0" width="180" height="64" rx="8" fill="white" stroke="#50C878" stroke-width="2"/>
    <rect x="0" y="0" width="180" height="28" rx="8" fill="#50C878"/>
    <rect x="0" y="14" width="180" height="14" fill="#50C878"/>
    <text x="90" y="19" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Organization</text>
    <text x="12" y="48" font-size="11" fill="#555">host, customer relationships</text>
  </g>

  <!-- PERSON (left) -->
  <g transform="translate(30, 385)">
    <rect x="0" y="0" width="180" height="48" rx="8" fill="white" stroke="#50C878" stroke-width="2"/>
    <rect x="0" y="0" width="180" height="28" rx="8" fill="#50C878"/>
    <rect x="0" y="14" width="180" height="14" fill="#50C878"/>
    <text x="90" y="19" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Person</text>
    <text x="12" y="44" font-size="11" fill="#555">site personnel, deployedBy</text>
  </g>

  <!-- ==================== RELATIONSHIP LINES ==================== -->

  <!-- Deployment Site -> Location -->
  <line x1="330" y1="240" x2="210" y2="160" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="222" y="181" width="66" height="18" rx="3" fill="white" fill-opacity="0.9"/>
  <text x="255" y="194" text-anchor="middle" font-size="11" fill="#333" font-style="italic">location</text>

  <!-- Deployment Site -> Environment Type -->
  <line x1="570" y1="232" x2="690" y2="156" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="594" y="176" width="86" height="18" rx="3" fill="white" fill-opacity="0.9"/>
  <text x="637" y="189" text-anchor="middle" font-size="11" fill="#333" font-style="italic">environment</text>

  <!-- Deployment Site -> Site Status -->
  <line x1="570" y1="290" x2="690" y2="370" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="604" y="322" width="52" height="18" rx="3" fill="white" fill-opacity="0.9"/>
  <text x="630" y="335" text-anchor="middle" font-size="11" fill="#333" font-style="italic">status</text>

  <!-- Deployment Site -> Organization (via Site Org Relationship) -->
  <line x1="330" y1="280" x2="210" y2="305" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="228" y="278" width="88" height="18" rx="3" fill="white" fill-opacity="0.9"/>
  <text x="272" y="291" text-anchor="middle" font-size="11" fill="#333" font-style="italic">organization</text>

  <!-- Deployment Site -> Person (via Site Personnel Assignment) -->
  <line x1="330" y1="305" x2="210" y2="397" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="230" y="348" width="60" height="18" rx="3" fill="white" fill-opacity="0.9"/>
  <text x="260" y="361" text-anchor="middle" font-size="11" fill="#333" font-style="italic">person</text>

  <!-- Distribution Log -> Deployment Site (site) -->
  <line x1="160" y1="450" x2="370" y2="310" stroke="#666" stroke-width="1.5" stroke-dasharray="6 3" marker-end="url(#arrow)"/>
  <rect x="218" y="378" width="36" height="18" rx="3" fill="white" fill-opacity="0.9"/>
  <text x="236" y="391" text-anchor="middle" font-size="11" fill="#333" font-style="italic">site</text>

  <!-- Distribution Log -> Product Version (version) -->
  <line x1="220" y1="488" x2="530" y2="482" stroke="#666" stroke-width="1.5" stroke-dasharray="6 3" marker-end="url(#arrow)"/>
  <rect x="348" y="473" width="56" height="18" rx="3" fill="white" fill-opacity="0.9"/>
  <text x="376" y="486" text-anchor="middle" font-size="11" fill="#333" font-style="italic">version</text>

  <!-- Deployment -> Product Version (version) -->
  <line x1="480" y1="480" x2="530" y2="480" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="486" y="462" width="56" height="18" rx="3" fill="white" fill-opacity="0.9"/>
  <text x="514" y="475" text-anchor="middle" font-size="11" fill="#333" font-style="italic">version</text>

  <!-- Deployment -> Environment Type (environment) -->
  <line x1="470" y1="450" x2="770" y2="180" stroke="#666" stroke-width="1.5" stroke-dasharray="6 3" marker-end="url(#arrow)"/>
  <rect x="608" y="296" width="86" height="18" rx="3" fill="white" fill-opacity="0.9"/>
  <text x="651" y="309" text-anchor="middle" font-size="11" fill="#333" font-style="italic">environment</text>

  <!-- ==================== SHARED IDENTITY ANNOTATION ==================== -->
  <rect x="568" y="540" width="320" height="52" rx="6" fill="#f0ecff" stroke="#7B68EE" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="728" y="559" text-anchor="middle" font-size="11" font-weight="bold" fill="#5a4fcf">Shared Identity Pattern</text>
  <text x="728" y="575" text-anchor="middle" font-size="10" fill="#666">Location is shared across products.</text>
  <text x="728" y="588" text-anchor="middle" font-size="10" fill="#666">Deployment Site is per-product, per-customer.</text>

  <!-- ==================== LINE STYLE LEGEND ==================== -->
  <line x1="420" y1="55" x2="460" y2="55" stroke="#666" stroke-width="1.5"/>
  <text x="466" y="59" font-size="11" fill="#555">Direct reference</text>
  <line x1="570" y1="55" x2="610" y2="55" stroke="#666" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="616" y="59" font-size="11" fill="#555">Cross-entity reference</text>
</svg>